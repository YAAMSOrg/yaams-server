# Single vhost serving the Laravel front controller.
#
# Listens on 8080 (see ports.conf sed in Dockerfile.prod) because the container
# may run as an unprivileged UID that cannot bind :80. TLS is terminated by an
# external reverse proxy - this vhost is plain HTTP only.
<VirtualHost *:8080>
    DocumentRoot /app/public

    <Directory /app/public>
        # Let Laravel's stock public/.htaccess handle the rewrite rules.
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
