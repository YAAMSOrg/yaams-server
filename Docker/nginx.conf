# Nginx serving the Laravel public/ dir, handing PHP to the php-fpm process
# that supervisord runs alongside it (see supervisord.conf).
#
# Listens on 8080 because the container may run as an unprivileged UID that
# cannot bind :80. Plain HTTP only - TLS is terminated by an external reverse
# proxy. Pid and temp paths point at /tmp so an arbitrary runtime UID works.

pid /tmp/nginx.pid;
error_log /dev/stderr warn;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    client_max_body_size 32m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;

    server {
        listen 8080;
        server_name _;

        root /app/public;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
        }

        # Deny dotfiles (except .well-known), e.g. a stray .env or .htaccess.
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
